<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Team Registration - Event Feedback System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .info-box {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
        }
        
        .info-box p {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎪 Event Registration</h1>
            <p>Register your team/stall for evaluation</p>
        </div>
        
        <div class="info-box">
            <p>📌 Please fill in all details carefully. Your team will be evaluated by our judges based on 5 criteria.</p>
        </div>
        
        <form id="registrationForm">
            <div class="form-group">
                <label>Team Name *</label>
                <input type="text" id="teamName" required placeholder="Enter your team name">
            </div>
            
            <div class="form-group">
                <label>Project/Art/Stall Name *</label>
                <input type="text" id="projectName" required placeholder="What is your project/stall called?">
            </div>
            
            <div class="form-group">
                <label>Subject/Category *</label>
                <select id="subject" required>
                    <option value="">Select category</option>
                    <option value="Technology">Technology</option>
                    <option value="Art & Design">Art & Design</option>
                    <option value="Food Stall">Food Stall</option>
                    <option value="Games & Entertainment">Games & Entertainment</option>
                    <option value="Educational">Educational</option>
                    <option value="Social Impact">Social Impact</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Email ID *</label>
                <input type="email" id="email" required placeholder="team@example.com">
            </div>
            
            <button type="submit">Register Team →</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // IMPORTANT: Replace with your Google Apps Script URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbwYrpzLcfMZ3aeYBtkrRgCc5JL93PAMBQ6fmMxTD1_d-5__M0WEpiusumHDHicp7c_r/exec';
        
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitButton = document.querySelector('button');
            submitButton.disabled = true;
            submitButton.textContent = 'Registering...';
            
            const data = {
                action: 'submitProject',
                teamName: document.getElementById('teamName').value.trim(),
                projectName: document.getElementById('projectName').value.trim(),
                subject: document.getElementById('subject').value,
                email: document.getElementById('email').value.trim()
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                showMessage('✓ Team registered successfully! Your team is now in the system.', 'success');
                document.getElementById('registrationForm').reset();
                
            } catch(error) {
                showMessage('⚠️ Registration failed. Please try again or contact event organizer.', 'error');
                console.error('Error:', error);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Register Team →';
            }
        });
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 5000);
        }
    </script>
</body>
</html>
