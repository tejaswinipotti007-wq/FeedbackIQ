<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Evaluation Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        .rating-question {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .rating-question label { font-size: 16px; margin-bottom: 15px; }
        .stars { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        .star {
            font-size: 40px;
            cursor: pointer;
            color: #ddd;
            transition: all 0.2s;
        }
        .star.selected { color: #ffc107; text-shadow: 0 0 10px rgba(255,193,7,0.5); }
        .star:hover { transform: scale(1.1); color: #ffc107; }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            resize: vertical;
            font-family: inherit;
        }
        .button-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn-calculate, .btn-submit {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-calculate { background: #28a745; color: white; }
        .btn-submit { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .btn-calculate:hover, .btn-submit:hover { transform: translateY(-2px); }
        .score-display {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 20px;
            font-weight: bold;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        .warning { background: #fff3cd; color: #856404; display: block; }
        .team-count {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Judge Evaluation Form</h1>
        <div class="subtitle">Rate each team on 5 criteria</div>
        
        <div class="form-group">
            <label>Select Team to Evaluate *</label>
            <select id="teamSelect">
                <option>Checking connection...</option>
            </select>
            <div id="teamCount" class="team-count"></div>
        </div>
        
        <div class="form-group">
            <label>Your Name (Judge) *</label>
            <input type="text" id="judgeName" placeholder="Enter your full name">
        </div>
        
        <div class="rating-question">
            <label>1. Innovation & Creativity - How original is the idea?</label>
            <div class="stars" data-question="q1">
                <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
            </div>
        </div>
        
        <div class="rating-question">
            <label>2. Execution & Quality - How well is it executed?</label>
            <div class="stars" data-question="q2">
                <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
            </div>
        </div>
        
        <div class="rating-question">
            <label>3. Impact & Value - What value does it bring?</label>
            <div class="stars" data-question="q3">
                <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
            </div>
        </div>
        
        <div class="rating-question">
            <label>4. Presentation - How effectively is it presented?</label>
            <div class="stars" data-question="q4">
                <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
            </div>
        </div>
        
        <div class="rating-question">
            <label>5. Overall Appeal - How impressive is it overall?</label>
            <div class="stars" data-question="q5">
                <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
            </div>
        </div>
        
        <div class="form-group">
            <label>Additional Comments (Optional)</label>
            <textarea id="comments" rows="3" placeholder="Any additional feedback..."></textarea>
        </div>
        
        <div class="button-group">
            <button class="btn-calculate" onclick="calculateScore()">Calculate Score</button>
            <button class="btn-submit" onclick="submitRating()">Submit Rating</button>
        </div>
        
        <div class="score-display" id="scoreDisplay">Total: 0/25 (0%)</div>
        <div id="message" class="message"></div>
    </div>

    <script>
        // ============================================
        // !!! REPLACE THIS WITH YOUR ACTUAL APPS SCRIPT URL !!!
        // ============================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbxbQC9Ce_ZXPNT5hFWyT_wdgkzJsBaCcI73vpdiF60DiTbcSEMfPjsZ8nIYte2socW7/exec';
        
        let currentRatings = { q1: 0, q2: 0, q3: 0, q4: 0, q5: 0 };
        
        // Test connection on page load
        async function testConnection() {
            const select = document.getElementById('teamSelect');
            const teamCountDiv = document.getElementById('teamCount');
            
            select.innerHTML = '<option>Testing connection...</option>';
            teamCountDiv.innerHTML = '🔌 Testing connection to Google Sheets...';
            
            try {
                console.log('Testing API at:', API_URL);
                const response = await fetch(API_URL + '?action=getProjects');
                const result = await response.json();
                
                console.log('Connection test result:', result);
                
                if (result.success) {
                    teamCountDiv.innerHTML = '✅ Connection successful! Loading teams...';
                    teamCountDiv.style.background = '#d4edda';
                    teamCountDiv.style.color = '#155724';
                    loadTeams();
                } else {
                    teamCountDiv.innerHTML = '❌ Connection failed: ' + (result.error || 'Unknown error');
                    teamCountDiv.style.background = '#f8d7da';
                    teamCountDiv.style.color = '#721c24';
                    select.innerHTML = '<option>❌ Connection error - Check API URL</option>';
                }
            } catch(error) {
                console.error('Connection error:', error);
                teamCountDiv.innerHTML = '❌ Cannot connect to server. Error: ' + error.message;
                teamCountDiv.style.background = '#f8d7da';
                teamCountDiv.style.color = '#721c24';
                select.innerHTML = '<option>❌ Connection failed - Check API URL</option>';
            }
        }
        
        async function loadTeams() {
            const select = document.getElementById('teamSelect');
            const teamCountDiv = document.getElementById('teamCount');
            
            select.innerHTML = '<option>Loading teams...</option>';
            
            try {
                const response = await fetch(API_URL + '?action=getProjects');
                const result = await response.json();
                
                console.log('Teams data:', result);
                
                if (result.success && result.projects && result.projects.length > 0) {
                    select.innerHTML = '<option value="">-- Select a team to evaluate --</option>';
                    
                    result.projects.forEach(team => {
                        const option = document.createElement('option');
                        option.value = team.teamName;
                        option.textContent = `${team.teamName} - ${team.projectName}`;
                        select.appendChild(option);
                    });
                    
                    teamCountDiv.innerHTML = `✅ ${result.projects.length} team(s) registered. Select one to evaluate.`;
                    teamCountDiv.style.background = '#d4edda';
                    teamCountDiv.style.color = '#155724';
                } else {
                    select.innerHTML = '<option value="">⚠️ No teams registered yet</option>';
                    teamCountDiv.innerHTML = '⚠️ No teams found. Please ask participants to register first.';
                    teamCountDiv.style.background = '#fff3cd';
                    teamCountDiv.style.color = '#856404';
                }
            } catch(error) {
                console.error('Error loading teams:', error);
                select.innerHTML = '<option>❌ Error loading teams</option>';
                teamCountDiv.innerHTML = '❌ Error: ' + error.message;
                teamCountDiv.style.background = '#f8d7da';
                teamCountDiv.style.color = '#721c24';
            }
        }
        
        // Star rating system
        document.querySelectorAll('.stars').forEach(starContainer => {
            const question = starContainer.dataset.question;
            const stars = starContainer.querySelectorAll('.star');
            
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const value = parseInt(star.dataset.value);
                    currentRatings[question] = value;
                    
                    stars.forEach(s => {
                        if (parseInt(s.dataset.value) <= value) {
                            s.classList.add('selected');
                        } else {
                            s.classList.remove('selected');
                        }
                    });
                    
                    calculateScore();
                });
            });
        });
        
        function calculateScore() {
            const total = currentRatings.q1 + currentRatings.q2 + currentRatings.q3 + currentRatings.q4 + currentRatings.q5;
            const percentage = (total / 25) * 100;
            document.getElementById('scoreDisplay').innerHTML = `Total: ${total}/25 (${percentage.toFixed(1)}%)`;
            return { total, percentage };
        }
        
        async function submitRating() {
            const teamName = document.getElementById('teamSelect').value;
            const judgeName = document.getElementById('judgeName').value.trim();
            
            if (!teamName) {
                showMessage('Please select a team to evaluate', 'error');
                return;
            }
            
            if (!judgeName) {
                showMessage('Please enter your name as judge', 'error');
                return;
            }
            
            for (let i = 1; i <= 5; i++) {
                if (currentRatings[`q${i}`] === 0) {
                    showMessage(`Please rate question ${i} (all 5 questions required)`, 'error');
                    return;
                }
            }
            
            const { percentage } = calculateScore();
            
            const data = {
                action: 'submitRating',
                teamName: teamName,
                judgeName: judgeName,
                q1: currentRatings.q1,
                q2: currentRatings.q2,
                q3: currentRatings.q3,
                q4: currentRatings.q4,
                q5: currentRatings.q5
            };
            
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            try {
                console.log('Submitting to:', API_URL);
                console.log('Data:', data);
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                console.log('Submit response:', result);
                
                if (result.success) {
                    showMessage(`✅ Rating submitted! Score: ${percentage.toFixed(1)}%`, 'success');
                    resetForm();
                } else {
                    showMessage(`❌ Error: ${result.error}`, 'error');
                }
            } catch(error) {
                console.error('Submit error:', error);
                showMessage(`❌ Submission failed: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Rating';
            }
        }
        
        function resetForm() {
            currentRatings = { q1: 0, q2: 0, q3: 0, q4: 0, q5: 0 };
            document.querySelectorAll('.star').forEach(star => star.classList.remove('selected'));
            document.getElementById('comments').value = '';
            document.getElementById('scoreDisplay').innerHTML = 'Total: 0/25 (0%)';
            document.getElementById('teamSelect').value = '';
            document.getElementById('judgeName').value = '';
        }
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 5000);
        }
        
        // Start the app
        testConnection();
    </script>
</body>
</html>
