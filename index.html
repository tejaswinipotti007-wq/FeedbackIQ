<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management Hub</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(at 0% 0%, #4f46e5 0px, transparent 50%),
                        radial-gradient(at 50% 0%, #ec4899 0px, transparent 50%),
                        radial-gradient(at 100% 100%, #3b82f6 0px, transparent 50%),
                        #1e1b4b;
            background-attachment: fixed;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #38bdf8 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .hub-menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
        }

        .hub-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #38bdf8;
            transform: translateY(-2px);
        }

        .btn-desc {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 400;
            margin-top: 4px;
            text-align: left;
        }

        .btn-text {
            text-align: left;
        }

        .arrow {
            font-size: 18px;
            color: #38bdf8;
            transition: transform 0.2s;
        }

        .hub-btn:hover .arrow {
            transform: translateX(4px);
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>Event Portal</h1>
    <p class="subtitle">Welcome! Please select your entry point.</p>
    
    <div class="hub-menu">
        <a href="index1.html" class="hub-btn">
            <div class="btn-text">
                <div>🚀 Participant Registration</div>
                <span class="btn-desc">Register your team and project ideas.</span>
            </div>
            <span class="arrow">➔</span>
        </a>

        <a href="judge2.html" class="hub-btn">
            <div class="btn-text">
                <div>⚖️ Judge Evaluation Panel</div>
                <span class="btn-desc">Authorized score inputs for panel judges.</span>
            </div>
            <span class="arrow">➔</span>
        </a>

        <a href="dashboard.html" class="hub-btn">
            <div class="btn-text">
                <div>📊 Live Leaderboard</div>
                <span class="btn-desc">Real-time analytical percentage scores.</span>
            </div>
            <span class="arrow">➔</span>
        </a>
    </div>
</div>

</body>
</html>
