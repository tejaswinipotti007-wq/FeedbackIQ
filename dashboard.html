<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Event Leaderboard</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(at 0% 0%, #4f46e5 0px, transparent 50%),
                        radial-gradient(at 50% 0%, #ec4899 0px, transparent 50%),
                        radial-gradient(at 100% 100%, #3b82f6 0px, transparent 50%),
                        #1e1b4b;
            background-attachment: fixed;
            color: #ffffff;
            padding: 40px 20px;
        }

        .dashboard-container {
            max-width: 850px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #38bdf8 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin: 0;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 18px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #38bdf8;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .leaderboard-item {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .leaderboard-item:hover {
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.1);
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        /* Top 3 Podium Accents */
        .rank-1 {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }
        .rank-2 {
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
            color: #1e1b4b;
        }
        .rank-3 {
            background: linear-gradient(135deg, #b45309 0%, #78350f 100%);
            color: #ffffff;
        }

        .team-name {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .score-section {
            display: flex;
            align-items: center;
        }

        .percentage-pill {
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.2);
            letter-spacing: 0.5px;
        }

        .rank-1-item { border-color: rgba(245, 158, 11, 0.3); background: rgba(245, 158, 11, 0.04); }
        
        .status-msg {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1>🏆 Analytics Standings</h1>
        <p class="subtitle">Live-updating calculation weights per Judge entry</p>
    </header>

    <div class="action-bar">
        <button class="refresh-btn" onclick="fetchLeaderboard()">
            <span id="syncIcon">🔄</span> Update Data
        </button>
    </div>

    <div class="leaderboard-list" id="leaderboardView">
        <div class="status-msg">Connecting to your secure live calculation streams...</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxxNUtYrh2BZrxW9DJXQzzU_qjXlh7Nt1qk3yW_03ErpraPL--KqD44uJMIteXwx02G/exec";

    function fetchLeaderboard() {
        const syncIcon = document.getElementById('syncIcon');
        syncIcon.style.transform = "rotate(360deg)";
        syncIcon.style.transition = "transform 0.8s ease";

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getDashboard' })
        })
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('leaderboardView');
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = `<div class="status-msg">Waiting for the first evaluation cards to be filed.</div>`;
                return;
            }

            data.forEach((item, index) => {
                let rank = index + 1;
                let rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
                let cardAccent = rank === 1 ? 'rank-1-item' : '';
                let displayRank = (rank === 1) ? '🥇' : (rank === 2) ? '🥈' : (rank === 3) ? '🥉' : rank;

                let row = `
                    <div class="leaderboard-item ${cardAccent}">
                        <div class="left-section">
                            <div class="rank-badge ${rankClass}">${displayRank}</div>
                            <div class="team-name">${item.teamName}</div>
                        </div>
                        <div class="score-section">
                            <span class="percentage-pill">${item.avgPercentage}%</span>
                        </div>
                    </div>
                `;
                container.innerHTML += row;
            });
        })
        .catch(err => {
            document.getElementById('leaderboardView').innerHTML = `<div class="status-msg" style="color: #ef4444;">Failed to poll streaming matrix.</div>`;
        })
        .finally(() => {
            setTimeout(() => { syncIcon.style.transform = "none"; syncIcon.style.transition = "none"; }, 800);
        });
    }

    // Auto update cycles every 20 seconds for seamless operations
    window.addEventListener('DOMContentLoaded', () => {
        fetchLeaderboard();
        setInterval(fetchLeaderboard, 20000);
    });
</script>
</body>
</html>
